name: Monthly Markdown Link Check

on:
  # Runs at midnight on the first of every month
  schedule:
    - cron: "0 0 1 * *"

jobs:
  markdown_link_check:
    name: Markdown Link Check
    uses: SchmiedmayerLab/.github/.github/workflows/markdown-links.yml@lukas/fix-artifacts
    permissions:
      contents: read
